# Marvel example — forestage agents via the forestage adapter.
#
# The forestage adapter injects:
#   - --name, --workspace, --team, --role, --socket (forestage flags)
#   - --permission-mode (forestage passes through to claude)
#   - --script if specified in runtime config
#   - -- --append-system-prompt "..." (claude passthrough for identity)
#   - MARVEL_SESSION, MARVEL_ROLE, MARVEL_TEAM, MARVEL_WORKSPACE env vars
#
# Theme and model are user choices — put them in runtime.args.
# Agents run in claude mode (no TUI) since marvel manages the tmux panes.
#
# Setup:
#   cd ~/work/aae-orc/forestage && cargo build
#   cd ~/work/aae-orc/marvel
#   ./marvel daemon &
#   ./marvel work examples/forestage-team.toml
#
# Test commands:
#   ./marvel get sessions
#   ./marvel capture dev/squad-worker-g1-0
#   ./marvel capture dev/squad-supervisor-g1-0
#   ./marvel shift dev/squad --role worker
#   ./marvel scale dev/squad --role worker --replicas 3
#   ./marvel stop

[workspace]
name = "dev"

[[team]]
name = "squad"

  [[team.role]]
  name = "supervisor"
  replicas = 1
  permissions = "auto"

    [team.role.runtime]
    image = "forestage"
    command = "forestage"
    args = ["--theme", "dune", "--mode", "claude"]

  [[team.role]]
  name = "worker"
  replicas = 2
  permissions = "plan"

    [team.role.runtime]
    image = "forestage"
    command = "forestage"
    args = ["--theme", "dune", "--mode", "claude"]
