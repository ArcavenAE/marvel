# Marvel example — forestage agents with five-primitive taxonomy.
#
# Per finding-019, persona and identity are per-role fields.
# Role name is the job function, NOT a character lookup.
#
# Setup:
#   cd ~/work/aae-orc/forestage && cargo build
#   cd ~/work/aae-orc/marvel
#   ./marvel daemon &
#   ./marvel work examples/forestage-team.toml

[workspace]
name = "dev"

[[team]]
name = "research-squad"

  [[team.role]]
  name = "supervisor"
  replicas = 1
  permissions = "auto"
  persona = "camina-drummer"
  identity = "research director"

    [team.role.runtime]
    image = "forestage"
    command = "forestage"
    args = ["--theme", "the-expanse", "--mode", "claude"]

  [[team.role]]
  name = "probe-runner"
  replicas = 2
  permissions = "plan"
  persona = "naomi-nagata"
  identity = "systems researcher"

    [team.role.runtime]
    image = "forestage"
    command = "forestage"
    args = ["--theme", "the-expanse", "--mode", "claude"]
