# Marvel example — forestage agents via the forestage adapter.
#
# Tests: forestage adapter selection, identity flag injection (--name,
# --workspace, --team, --role, --socket), permission injection, persona
# args passthrough, supervisor vs worker role differentiation.
#
# The forestage adapter automatically:
#   - Injects --name, --workspace, --team, --role, --socket flags
#   - Injects --permission-mode from the role's permissions field
#   - Injects --script if specified in the runtime config
#   - Sets MARVEL_SESSION, MARVEL_ROLE, MARVEL_TEAM, MARVEL_WORKSPACE env vars
#
# NOTE: update the command path to match your forestage binary location.
#
# Setup:
#   cd ~/work/aae-orc/forestage && cargo build
#   cd ~/work/aae-orc/marvel
#   ./marvel daemon &
#   ./marvel work examples/forestage-team.toml
#
# Verify adapter selection (daemon log should show):
#   session dev/squad-worker-g1-0 using forestage adapter
#
# Test commands:
#   ./marvel get sessions
#   ./marvel capture dev/squad-worker-g1-0
#   ./marvel capture dev/squad-supervisor-g1-0
#   ./marvel inject dev/squad-supervisor-g1-0 "/help" -e
#   ./marvel shift dev/squad --role worker
#   ./marvel scale dev/squad --role worker --replicas 3
#   ./marvel stop

[workspace]
name = "dev"

[[team]]
name = "squad"

  [[team.role]]
  name = "supervisor"
  replicas = 1
  permissions = "auto"

    [team.role.runtime]
    image = "forestage"
    command = "/Users/michael.pursifull/work/aae-orc/forestage/target/debug/forestage"

  [[team.role]]
  name = "worker"
  replicas = 2
  permissions = "plan"

    [team.role.runtime]
    image = "forestage"
    command = "/Users/michael.pursifull/work/aae-orc/forestage/target/debug/forestage"
