# Marvel example — shift demonstration with heartbeats.
#
# Tests: rolling shift lifecycle, generation tracking, heartbeat-based
# health checks, supervisor-last shift order, watch mode.
#
# Uses the simulator (not real agents) with short tick intervals so
# health state and shift progression are visible quickly.
#
# Setup:
#   just build
#   ./marvel daemon &
#   ./marvel work examples/shift-demo.toml
#
# Test commands:
#   ./marvel get sessions -w
#   ./marvel shift shift-demo/squad
#
# What to watch:
#   - GEN column increments from 1 to 2
#   - New gen-2 sessions launch first (ShiftLaunching phase)
#   - Old gen-1 sessions drain one per tick (ShiftDraining phase)
#   - Workers shift before supervisor (shift order)
#   - HEALTH column shows healthy once heartbeats arrive
#
# Cleanup:
#   ./marvel stop

[workspace]
name = "shift-demo"

[[team]]
name = "squad"

  [[team.role]]
  name = "worker"
  replicas = 2

    [team.role.runtime]
    image = "simulator"
    command = "bin/simulator"
    args = ["--tick", "1000"]

    [team.role.healthcheck]
    type = "heartbeat"
    timeout = "10s"
    failure_threshold = 3

  [[team.role]]
  name = "supervisor"
  replicas = 1

    [team.role.runtime]
    image = "simulator"
    command = "bin/simulator"
    args = ["--tick", "2000"]

    [team.role.healthcheck]
    type = "heartbeat"
    timeout = "10s"
    failure_threshold = 3
