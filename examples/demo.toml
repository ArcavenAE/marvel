# Marvel demo manifest — simulator agents + chaos supervisor.
#
# Load with: marvel work examples/demo.toml
# Requires: bin/simulator built via `just build`

[workspace]
name = "demo"

[[team]]
name = "squad"

  [[team.role]]
  name = "agent"
  replicas = 3

    [team.role.runtime]
    image = "simulator"
    command = "bin/simulator"
    args = ["--tick", "3000"]

    [team.role.healthcheck]
    type = "heartbeat"
    timeout = "30s"
    failure_threshold = 3

  [[team.role]]
  name = "supervisor"
  replicas = 1

    [team.role.runtime]
    image = "simulator"
    command = "bin/simulator"
    args = ["--tick", "5000"]
    script = "scripts/chaos.lua"

    [team.role.healthcheck]
    type = "heartbeat"
    timeout = "30s"
    failure_threshold = 3

[[endpoint]]
name = "agent-svc"
team = "squad"
