# Marvel demo manifest — simulator agents + chaos supervisor.
#
# Load with: marvel work examples/demo.toml
# Requires: bin/simulator built via `just build`

[workspace]
name = "demo"

[[team]]
name = "agent"
replicas = 3
role = "agent"

  [team.runtime]
  image = "simulator"
  command = "bin/simulator"
  args = ["--tick", "3000"]

[[team]]
name = "supervisor"
replicas = 1
role = "supervisor"

  [team.runtime]
  image = "simulator"
  command = "bin/simulator"
  args = ["--tick", "5000"]
  script = "scripts/chaos.lua"

[[endpoint]]
name = "agent-svc"
team = "agent"
