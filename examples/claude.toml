# Marvel manifest — real Claude Code agents + chaos supervisor.
#
# Load with: marvel work examples/claude.toml
# Requires: claude CLI installed, bin/simulator built via `just build`

[workspace]
name = "ccode"

[[team]]
name = "claude-squad"

  [[team.role]]
  name = "coder"
  replicas = 2

    [team.role.runtime]
    image = "claude"
    command = "/Users/michael.pursifull/.local/bin/claude"

  [[team.role]]
  name = "supervisor"
  replicas = 1

    [team.role.runtime]
    image = "simulator"
    command = "bin/simulator"
    args = ["--tick", "5000"]
    script = "scripts/chaos.lua"

[[endpoint]]
name = "claude-svc"
team = "claude-squad"
