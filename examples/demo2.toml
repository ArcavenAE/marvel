# Marvel demo — 5 agents + chaos supervisor with healthchecks.
#
# Load with: marvel work examples/demo2.toml
# Requires: bin/simulator built via `just build`

[workspace]
name = "demo2"

[[team]]
name = "hulk-squad"

  [[team.role]]
  name = "smash"
  replicas = 5

    [team.role.runtime]
    image = "simulator"
    command = "bin/simulator"
    args = ["--tick", "3000"]

    [team.role.healthcheck]
    type = "heartbeat"
    timeout = "30s"
    failure_threshold = 3

  [[team.role]]
  name = "supervisor"
  replicas = 1

    [team.role.runtime]
    image = "simulator"
    command = "bin/simulator"
    args = ["--tick", "5000"]
    script = "scripts/chaos.lua"

    [team.role.healthcheck]
    type = "heartbeat"
    timeout = "30s"
    failure_threshold = 3

[[endpoint]]
name = "hulk-svc"
team = "hulk-squad"
