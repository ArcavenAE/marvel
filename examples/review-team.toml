# Marvel example — multi-role review team.
#
# Demonstrates heterogeneous roles: supervisor, architect, reviewers.
# Each role has its own runtime config, replica count, and restart policy.
#
# Load with: marvel work examples/review-team.toml
# Requires: bin/simulator built via `just build`

[workspace]
name = "review"

[[team]]
name = "code-review"

  [[team.role]]
  name = "reviewer"
  replicas = 3

    [team.role.runtime]
    image = "simulator"
    command = "bin/simulator"
    args = ["--tick", "2000"]

    [team.role.healthcheck]
    type = "heartbeat"
    timeout = "15s"
    failure_threshold = 3

  [[team.role]]
  name = "architect"
  replicas = 1
  restart_policy = "on-failure"

    [team.role.runtime]
    image = "simulator"
    command = "bin/simulator"
    args = ["--tick", "4000"]

    [team.role.healthcheck]
    type = "heartbeat"
    timeout = "30s"
    failure_threshold = 5

  [[team.role]]
  name = "supervisor"
  replicas = 1

    [team.role.runtime]
    image = "simulator"
    command = "bin/simulator"
    args = ["--tick", "5000"]
    script = "scripts/scaler.lua"

    [team.role.healthcheck]
    type = "heartbeat"
    timeout = "30s"
    failure_threshold = 3

[[endpoint]]
name = "review-svc"
team = "code-review"
