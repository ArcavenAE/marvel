# Marvel example — forestage agents with five-primitive taxonomy.
#
# Per finding-019, agent identity has five independent primitives:
#   - persona: character slug from theme roster (--persona)
#   - theme: the roster (in runtime.args as --theme)
#   - identity: professional lens (--identity)
#   - role: job assignment on the team (role.name → --role)
#   - process: what the team does (implicit in team purpose)
#
# The forestage adapter injects:
#   - --persona, --identity (from role config)
#   - --role (from role.name — job function, NOT character lookup)
#   - --name, --workspace, --team, --socket (marvel identity)
#   - --permission-mode (forestage passes through to claude)
#   - -- --append-system-prompt "..." (claude passthrough for team context)
#   - MARVEL_SESSION, MARVEL_ROLE, MARVEL_TEAM, MARVEL_WORKSPACE env vars
#
# Setup:
#   cd ~/work/aae-orc/forestage && cargo build
#   cd ~/work/aae-orc/marvel
#   ./marvel daemon &
#   ./marvel work examples/forestage-team.yaml

workspace:
  name: dev

teams:
  - name: research-squad
    roles:
      - name: supervisor
        replicas: 1
        permissions: auto
        persona: camina-drummer
        identity: "research director"
        runtime:
          image: forestage
          command: forestage
          args: ["--theme", "the-expanse", "--mode", "claude"]

      - name: probe-runner
        replicas: 2
        permissions: plan
        persona: naomi-nagata
        identity: "systems researcher"
        runtime:
          image: forestage
          command: forestage
          args: ["--theme", "the-expanse", "--mode", "claude"]

      - name: reviewer
        replicas: 1
        permissions: plan
        persona: chrisjen-avasarala
        identity: "knowledge architect"
        runtime:
          image: forestage
          command: forestage
          args: ["--theme", "the-expanse", "--mode", "claude"]
