title: "Shift Mechanics — Rolling Replacement of Team Roles"
content: |
  Shifts are rolling replacements of agents within a team. The
  heterogeneous team model (bedrock) provides the structure; this
  question asks how shifts execute.

  A shift launches new agents, passes preflight checks, and takes
  over from the old shift. The supervisor is NOT exempt — it is
  the most important handoff.

  Triggers: scheduled, context pressure, manual, config changes,
  detected failures (repeated heartbeat misses, errors), login
  failures with LLM services, service updates (Claude Code updates,
  API changes, new model requiring restart), memory pressure.

  Questions:
  - What is the shift lifecycle? (announce → launch → preflight → handover → drain)
  - How does supervisor handoff work? (shared state? workspace volume?)
  - What preflight checks must pass before handover?
  - Rolling vs blue-green vs surge strategy — when to use which?
  - How does the team controller express shift state?
  - What triggers are automatic vs manual?
edges:
  - target: question-org-model
    type: depends
    note: "Shifts operate on the heterogeneous team model"
