id: question-shift-triggers
type: question
confidence: frontier
title: "Automatic Shift Triggers"
content: |
  Manual shifts work (bedrock). This question asks: what triggers
  shifts automatically?

  Known triggers from user input:
  - Scheduled ("shift change every 6 hours")
  - Context pressure (sessions exceed threshold)
  - Config changes (agent definitions need re-read)
  - Detected failures (repeated heartbeat misses, errors)
  - Login failures with Claude/LLM services
  - Service updates (Claude Code updates, API changes, new model)
  - Memory pressure (Claude Code reporting memory balloons)
  - Unexpected behavior by existing agents

  Questions:
  - Which triggers should be team-level vs role-level?
  - How does context pressure aggregate? (any session? average? all?)
  - What failure detection is feasible with current heartbeat data?
  - How does marvel detect Claude Code updates or API changes?
  - Is Schedule resource type the right abstraction for timed shifts?
