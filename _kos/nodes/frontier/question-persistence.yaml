id: question-persistence
type: question
confidence: frontier
title: "Persistence — what state survives restart"
content: |
  MVP is entirely in-memory. All state is lost on daemon restart.
  What needs persistence? Candidates: session state and history,
  team configuration, manifest history, health check results,
  pack resolution cache, volume mount records.

  What store? SQLite (simple, embedded, zero-config), flat files
  (human-readable, git-friendly), or an etcd-like model (consistent
  with k8s inspiration)? The store choice affects whether marvel
  can recover sessions after a crash vs. requiring a full reconcile
  from manifests.
