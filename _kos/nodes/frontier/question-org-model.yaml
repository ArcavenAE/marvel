title: "Organizational Model — Workspace / Group / Team / Shift"
content: |
  Marvel's k8s mapping needs refinement. Current model has Workspace
  (namespace) and Team (deployment). Gaps surfaced in simulator demos:
  what groups a supervisor with its agents? What scopes shared resources?
  What replaces stale sessions?

  Hypothesis: two orthogonal axes — a hierarchy (Group > Team > Session,
  with Section and Division above if needed) and Workspace as a sandbox
  for shared resources (git worktrees, communication boundaries, shared
  data). Shifts are in-situ rolling replacements of a team, triggered
  by schedule, context pressure, manual command, or config change.

  Questions: how does a group manifest express supervisor-agent bindings?
  What shared resources does a workspace provide? What policy governs
  cross-workspace supervisor communication? Is shift a team capability
  or a separate concept?
