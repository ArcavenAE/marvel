title: "Healthchecks — Heartbeat Staleness + Restart Policy"
content: |
  Resolved: health evaluation runs in the reconciliation loop.
  Heartbeat staleness detection with configurable timeout and failure
  threshold. Restart policies (always, on-failure, never) on roles.
  Sessions without healthcheck config stay unknown (opt-in).
  Shift preflight checks first heartbeat received.

  Prompt-response and richer agent signals are future work.
  See finding-003-healthchecks and _kos/ideas/health-signal-taxonomy.md.
