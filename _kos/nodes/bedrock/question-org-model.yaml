title: "Organizational Model — Heterogeneous Teams with Roles"
content: |
  Resolved: teams contain heterogeneous roles. The supervisor-agent
  binding is the team itself. Each role has its own runtime and replica
  count. Reconciliation is per-role. Session naming: teamname-rolename-N.

  Group is a collection of teams — placeholder, no evidence for when
  it's needed yet. Workspace provides isolation boundary. Shifts are
  a team capability (structurally ready, not yet implemented).

  See finding-001-heterogeneous-teams for full evidence.
